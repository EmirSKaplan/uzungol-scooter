<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Uzungöl Scooter</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
</head>
<body>

  <!-- ==========================================
       LOGIN SCREEN
       ========================================== -->
  <div class="admin-login" id="admin-login">
    <div class="admin-login__card">
      <div class="admin-login__logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 class="admin-login__title">Yönetim Paneli</h1>
      <p class="admin-login__subtitle">Uzungöl Scooter Kiralama</p>
      <form id="login-form">
        <div class="admin-login__input-group">
          <label class="admin-login__label" for="admin-password">Şifre</label>
          <input class="admin-login__input" type="password" id="admin-password" placeholder="Yönetici şifrenizi girin" autocomplete="current-password" required>
        </div>
        <button class="admin-login__btn" type="submit">Giriş Yap</button>
        <div class="admin-login__error" id="login-error">Yanlış şifre. Tekrar deneyin.</div>
      </form>
    </div>
  </div>

  <!-- ==========================================
       ADMIN DASHBOARD (Hidden until login)
       ========================================== -->
  <div class="admin-wrapper" id="admin-wrapper" style="display:none;">
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar__header">
        <div class="admin-sidebar__logo">
          <div class="admin-sidebar__logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          </div>
          <div class="admin-sidebar__logo-text">
            Uzungöl Scooter
            <small>Admin Panel</small>
          </div>
        </div>
      </div>

      <nav class="admin-sidebar__nav">
        <div class="admin-sidebar__section-title">Genel</div>
        <button class="admin-sidebar__link active" data-section="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>

        <div class="admin-sidebar__section-title">İçerik Yönetimi</div>
        <button class="admin-sidebar__link" data-section="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Logo Yönetimi
        </button>
        <button class="admin-sidebar__link" data-section="scooters">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Scooter Modelleri
        </button>
        <button class="admin-sidebar__link" data-section="pricing">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Fiyatlar
        </button>
        <button class="admin-sidebar__link" data-section="pagecontent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Sayfa İçerikleri
        </button>

        <div class="admin-sidebar__section-title">Ayarlar</div>
        <button class="admin-sidebar__link" data-section="hours">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Çalışma Saatleri
        </button>
        <button class="admin-sidebar__link" data-section="contact">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          İletişim Bilgileri
        </button>
        <button class="admin-sidebar__link" data-section="backup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Yedekleme
        </button>
      </nav>

      <div class="admin-sidebar__footer">
        <button class="admin-sidebar__footer-link" onclick="window.open('index.html','_blank')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Siteyi Görüntüle
        </button>
        <button class="admin-sidebar__footer-link" id="logout-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Çıkış Yap
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main" id="admin-main">
      <!-- Top Bar -->
      <div class="admin-topbar">
        <div class="admin-topbar__left">
          <button class="admin-topbar__hamburger" id="sidebar-toggle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2 class="admin-topbar__title" id="page-title">Dashboard</h2>
        </div>
        <div class="admin-topbar__right">
          <a href="index.html" class="btn btn--sm btn--secondary" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Siteyi Gör
          </a>
        </div>
      </div>

      <!-- Content Area -->
      <div class="admin-content" id="admin-content">
        <!-- Sections will be rendered here by admin.js -->
      </div>
    </main>
  </div>

  <!-- Modal Container -->
  <div class="admin-modal-backdrop" id="modal-backdrop">
    <div class="admin-modal" id="modal">
      <div class="admin-modal__header">
        <h3 class="admin-modal__title" id="modal-title">Modal</h3>
        <button class="admin-modal__close" id="modal-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="admin-modal__body" id="modal-body"></div>
      <div class="admin-modal__footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="admin-toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
